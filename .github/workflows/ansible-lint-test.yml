---

# Workflow for ansible-lint of a role

name: test for ansible-lint reusable workflow

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'roles/sap_vm_preconfigure/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'roles/sap_vm_preconfigure/**'
  workflow_dispatch:
    branches:
      - main
      - dev
    paths:
      - '**'

jobs:
  call-ansible-lint-with-role:
    uses: Wabri/community.sap_install/.github/workflows/ansible-lint-sap_reusable_workflow.yml@main
    with:
      role: sap_vm_preconfigure

