---

# Workflow for ansible-lint of a role

name: test for ansible-lint reusable workflow

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'roles/sap_vm_preconfigure/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'roles/sap_vm_preconfigure/**'

jobs:
  ansible-lint:
    call-ansible-lint-with-role:
        uses: wabri/community.sap_install/.github/workflows/ansible-lint-reusable-workflow.yml@main
        with:
          role: sap_vm_preconfigure
